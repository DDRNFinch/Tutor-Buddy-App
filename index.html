<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#315c9b"><title>Tutor Buddy</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--b:#315c9b;--bd:#203f70;--bg:#f4f6f9;--c:#fff;--t:#202630;--m:#6d7680;--l:#d9dee5;--g:#16845b;--a:#d79b21;--r:#a92323}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:Arial,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}
header{background:linear-gradient(135deg,var(--bd),var(--b));color:#fff;padding:16px;position:sticky;top:0;z-index:9}.brand{max-width:1100px;margin:auto;display:flex;gap:12px;align-items:center}.brand img{width:48px;border-radius:12px}.brand h1{margin:0;font-size:22px}.brand p{margin:2px 0 0;font-size:13px}
nav{max-width:1100px;margin:12px auto 0;display:grid;grid-template-columns:repeat(6,1fr);gap:8px}nav button{border:0;border-radius:10px;padding:9px;background:#ffffff22;color:#fff;font-weight:700}nav button.active{background:#fff;color:var(--bd)}
.mobile{display:none;max-width:1100px;margin:10px auto 0}.mobile select{width:100%;padding:10px;border:0;border-radius:10px}main{max-width:1100px;margin:auto;padding:16px}
.card{background:#fff;border:1px solid var(--l);border-radius:15px;padding:16px;margin-bottom:14px;box-shadow:0 8px 22px #1b27360d}.hero{background:linear-gradient(135deg,#edf4ff,#fff)}
h2,h3{margin-top:0}.eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--b)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.grid3,.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
label{display:block;font-weight:700;font-size:13px;margin-bottom:10px}input,select,textarea{width:100%;padding:10px;border:1px solid var(--l);border-radius:10px;background:#fff;margin-top:6px}textarea{min-height:90px}
.primary,.secondary,.danger{border:0;border-radius:10px;padding:10px 13px;font-weight:800}.primary{background:var(--b);color:#fff}.secondary{background:#e9eef5}.danger{background:#fde8e8;color:var(--r)}.buttons{display:flex;gap:8px;flex-wrap:wrap}
.metric,.actions button{background:#fff;border:1px solid var(--l);border-radius:13px;padding:14px;text-align:left}.metric span,.small{font-size:12px;color:var(--m)}.metric strong{font-size:26px}.actions b{display:block;margin:7px 0 4px}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--l)}.row:last-child{border-bottom:0}.badge{padding:4px 8px;border-radius:99px;font-size:11px;font-weight:800}.green{background:#e5f5ee;color:var(--g)}.amber{background:#fff1cf;color:#8d6000}.red{background:#fde6e6;color:var(--r)}.grey{background:#edf0f3}
.att{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.att label{margin:0;display:flex;gap:6px;align-items:center}.att input{width:auto;margin:0}.att select{min-width:155px;margin:0}
table{border-collapse:collapse;width:100%;font-size:12px}th,td{border:1px solid var(--l);padding:7px;text-align:left}th{background:#eef3f9}.scroll{overflow:auto}.yes{background:#eefaf4}.late{background:#fff8e8}.no{background:#fff2f2}.empty{text-align:center;color:var(--m);padding:22px}
@media(max-width:760px){nav{display:none}.mobile{display:block}.grid,.grid3,.actions{grid-template-columns:1fr}main{padding:10px}.row{align-items:flex-start;flex-direction:column}.buttons>*{flex:1}}

.tracker-wrap{max-height:70vh;overflow:auto}
.tracker-table{min-width:max-content}
.tracker-table th,.tracker-table td{min-width:130px;text-align:center}
.tracker-table .sticky-col{position:sticky;left:0;z-index:3;background:#fff;min-width:180px;text-align:left}
.tracker-table .sticky-head{position:sticky;top:0;z-index:4;background:#eef3f9}
.tracker-table .sticky-col.sticky-head{z-index:5}

</style></head><body>
<header><div class="brand"><img src="icon-192.png"><div><h1>Tutor Buddy</h1><p>Registers, attendance and lesson tracking</p></div></div><nav id="nav"></nav><div class="mobile"><select id="mnav"></select></div></header>
<main id="app"></main><script>
const KEY="tutorBuddyV1";const blank={profile:{name:"",college:"",email:""},classes:[],registers:[],current:null,version:"1.0.3"};let state=load(),route="home";
function load(){try{return Object.assign(structuredClone(blank),JSON.parse(localStorage.getItem(KEY)||"{}"))}catch(e){return structuredClone(blank)}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function id(p){return p+"-"+Date.now()+"-"+Math.random().toString(36).slice(2,7)}function esc(s=""){return String(s).replace(/[&<>"']/g,x=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[x]))}
function dateUK(v){return v?new Date(v+"T12:00:00").toLocaleDateString("en-GB"):""}const R=[["home","🏠 Home"],["classes","👥 Classes"],["register","✅ New Register"],["tracker","📊 Lesson Tracker"],["documents","📄 Documents"],["settings","⚙️ Settings"]];
function go(x){route=x;render()}document.addEventListener("click",e=>{let b=e.target.closest("[data-route]");if(b)go(b.dataset.route)});mnav.onchange=()=>go(mnav.value);
function render(){nav.innerHTML=R.map(([k,l])=>`<button data-route="${k}" class="${route===k?"active":""}">${l}</button>`).join("");mnav.innerHTML=R.map(([k,l])=>`<option value="${k}" ${route===k?"selected":""}>${l}</option>`).join("");({home,classes,register,tracker,documents,settings}[route]||home)()}
function cls(){return state.classes.find(x=>x.id===state.current)||state.classes[0]||null}
function stats(cid,lid,from="",to=""){
  let p=0,l=0,aa=0,ua=0,s=0;
  state.registers.filter(r=>r.classId===cid&&(!from||r.date>=from)&&(!to||r.date<=to)).forEach(r=>{
    const periods=r.attendance[lid]?.periods||{};
    Object.values(periods).forEach(x=>{
      if(x.status==="Present")p++;
      if(x.status==="Late")l++;
      if(x.status==="Authorised Absence")aa++;
      if(x.status==="Unauthorised Absence")ua++;
      if(x.status==="Sick")s++;
    });
  });
  let t=p+l+aa+ua+s;
  return{p,l,aa,ua,s,t,pct:t?Math.round((p+l)/t*100):null};
}
function statusCode(status){
  return status==="Present"?"P":status==="Late"?"L":status==="Authorised Absence"?"A":status==="Unauthorised Absence"?"U":status==="Sick"?"S":"—";
}
function dayPercentage(record,learnerId){
  const periods=Object.values(record.attendance[learnerId]?.periods||{});
  if(!periods.length)return null;
  const attended=periods.filter(p=>p.status==="Present"||p.status==="Late").length;
  return Math.round(attended/periods.length*100);
}
function home(){let recent=[...state.registers].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5),learners=state.classes.reduce((n,c)=>n+c.learners.length,0);app.innerHTML=`<section class="card hero"><span class="eyebrow">DAILY TUTOR TOOLKIT</span><h2>Welcome${state.profile.name?", "+esc(state.profile.name):""}</h2><p>Create registers, track attendance and see which learners attended each subject.</p></section><section class="grid3"><div class="metric"><span>Classes</span><strong>${state.classes.length}</strong></div><div class="metric"><span>Learners</span><strong>${learners}</strong></div><div class="metric"><span>Registers</span><strong>${state.registers.length}</strong></div></section><section class="actions"><button data-route="register">✅<b>Create today's register</b><span class="small">Date, times, subject and attendance.</span></button><button data-route="classes">👥<b>Manage classes</b><span class="small">Add new learners at any time.</span></button><button data-route="tracker">📊<b>Lesson tracker</b><span class="small">Attendance percentages and missed subjects.</span></button></section><section class="card"><h3>Recent registers</h3>${recent.length?recent.map(r=>`<div class="row"><div><b>${esc(r.className)}</b><div class="small">${dateUK(r.date)} • ${esc(r.subject)}</div></div><span class="badge grey">${Object.values(r.attendance).filter(x=>Object.values(x.periods||{}).some(p=>["Present","Late"].includes(p.status))).length}/${Object.keys(r.attendance).length}</span></div>`).join(""):'<div class="empty">No registers saved yet.</div>'}</section>`}
function classes(){app.innerHTML=`<section class="card hero"><span class="eyebrow">CLASS SETUP</span><h2>Classes</h2><p>Create a class with usual times, then add learners.</p></section><section class="card"><button class="primary" id="newClass">+ Create class</button></section><section class="card"><h3>Your classes</h3><div id="list"></div></section>`;drawClasses();newClass.onclick=()=>classForm()}
function drawClasses(){list.innerHTML=state.classes.length?state.classes.map(c=>`<div class="row"><div><b>${esc(c.name)}</b><div class="small">${c.learners.length} learners • ${c.start}-${c.end} • ${c.breaks?.length||0} break${(c.breaks?.length||0)===1?"":"s"}</div></div><div class="buttons"><button class="secondary" data-edit="${c.id}">Edit</button><button class="primary" data-use="${c.id}">Use</button></div></div>`).join(""):'<div class="empty">No classes created.</div>';list.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>classForm(b.dataset.edit));list.querySelectorAll("[data-use]").forEach(b=>b.onclick=()=>{state.current=b.dataset.use;save();go("register")})}
function classForm(cid){
  let old=state.classes.find(x=>x.id===cid),
      c=old?structuredClone(old):{id:id("class"),name:"",course:"",start:"09:00",breaks:[{start:"10:00",end:"10:30"},{start:"12:00",end:"13:00"}],end:"14:00",learners:[]};
  c.breaks ||= [];
  app.innerHTML=`<section class="card"><button class="secondary" data-route="classes">← Back</button></section>
  <section class="card"><h2>${old?"Edit":"Create"} Class</h2>
    <div class="grid">
      <label>Class name<input id="cn" value="${esc(c.name)}" placeholder="e.g. Site Carpentry Year 1"></label>
      <label>Course<input id="cc" value="${esc(c.course)}"></label>
      <label>Start<input id="cs" type="time" value="${c.start}"></label>
      <label>End<input id="ce" type="time" value="${c.end}"></label>
    </div>
    <h3>Breaks</h3>
    <p class="small">Add or remove breaks. Tutor Buddy will create one attendance period between each break.</p>
    <div id="breakList"></div>
    <button class="secondary" id="addBreak">+ Add break</button>
    <hr>
    <button class="primary" id="next">Next: Add learners</button>
  </section>`;

  const drawBreaks=()=>{
    breakList.innerHTML=c.breaks.length?c.breaks.map((b,i)=>`
      <div class="row">
        <div class="grid" style="width:100%">
          <label>Break ${i+1} start<input type="time" data-break-start="${i}" value="${b.start}"></label>
          <label>Break ${i+1} end<input type="time" data-break-end="${i}" value="${b.end}"></label>
        </div>
        <button class="danger" data-remove-break="${i}">Remove</button>
      </div>`).join(""):'<div class="empty">No breaks added.</div>';
    breakList.querySelectorAll("[data-break-start]").forEach(x=>x.onchange=()=>c.breaks[Number(x.dataset.breakStart)].start=x.value);
    breakList.querySelectorAll("[data-break-end]").forEach(x=>x.onchange=()=>c.breaks[Number(x.dataset.breakEnd)].end=x.value);
    breakList.querySelectorAll("[data-remove-break]").forEach(x=>x.onclick=()=>{c.breaks.splice(Number(x.dataset.removeBreak),1);drawBreaks()});
  };
  drawBreaks();
  addBreak.onclick=()=>{c.breaks.push({start:"12:00",end:"12:30"});drawBreaks()};
  next.onclick=()=>{
    c.name=cn.value.trim();c.course=cc.value.trim();c.start=cs.value;c.end=ce.value;
    c.breaks.sort((a,b)=>a.start.localeCompare(b.start));
    if(!c.name)return alert("Enter a class name.");
    learnerPage(c);
  };
}
function learnerPage(c){app.innerHTML=`<section class="card"><h2>${esc(c.name)} — Learners</h2><div class="grid"><label>Name<input id="ln"></label><label>Learner ID (optional)<input id="lr"></label></div><button class="primary" id="add">+ Add learner</button></section><section class="card"><div id="ll"></div></section><section class="card"><div class="buttons"><button class="secondary" data-route="classes">Cancel</button><button class="primary" id="saveClass">Save class</button></div></section>`;let draw=()=>{ll.innerHTML=c.learners.length?c.learners.map(l=>`<div class="row"><div><b>${esc(l.name)}</b><div class="small">${esc(l.ref||"")}</div></div><button class="danger" data-rm="${l.id}">Remove</button></div>`).join(""):'<div class="empty">No learners added.</div>';ll.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{c.learners=c.learners.filter(x=>x.id!==b.dataset.rm);draw()})};draw();add.onclick=()=>{if(!ln.value.trim())return;c.learners.push({id:id("learner"),name:ln.value.trim(),ref:lr.value.trim()});ln.value="";lr.value="";draw()};saveClass.onclick=()=>{let i=state.classes.findIndex(x=>x.id===c.id);if(i>=0)state.classes[i]=c;else state.classes.push(c);state.current=c.id;save();go("classes")}}

function teachingPeriods(c){
  const breaks=[...(c.breaks||[])].filter(b=>b.start&&b.end).sort((a,b)=>a.start.localeCompare(b.start));
  const periods=[];
  let current=c.start;
  breaks.forEach((b,i)=>{
    if(current<b.start)periods.push({id:`p${periods.length}`,start:current,end:b.start,label:`${current}–${b.start}`});
    current=b.end;
  });
  if(current<c.end)periods.push({id:`p${periods.length}`,start:current,end:c.end,label:`${current}–${c.end}`});
  return periods;
}
function register(){
  if(!state.classes.length){
    app.innerHTML=`<section class="card"><h2>Create a class first</h2><button class="primary" data-route="classes">Create class</button></section>`;
    return;
  }

  let c=cls();
  state.current=c.id;

  app.innerHTML=`<section class="card hero">
    <span class="eyebrow">DAILY REGISTER</span>
    <h2>Create Register</h2>
    <p>Tick Present for each learner. Tick Late if they arrived late. Leave Present unticked and choose the absence reason when needed.</p>
  </section>

  <section class="card">
    <div class="grid">
      <label>Class
        <select id="rc">${state.classes.map(x=>`<option value="${x.id}" ${x.id===c.id?"selected":""}>${esc(x.name)}</option>`).join("")}</select>
      </label>
      <label>Date<input id="rd" type="date" value="${new Date().toISOString().slice(0,10)}"></label>
      <label>Subject covered<input id="rs" placeholder="e.g. Installing floor joists"></label>
    </div>
  </section>

  <section class="card">
    <div class="buttons">
      <button class="secondary" id="all">Mark all present</button>
      <button class="secondary" id="none">Clear all</button>
    </div>
    <div id="rl"></div>
  </section>

  <section class="card">
    <label>Notes for today
      <textarea id="rn" placeholder="Add any comments about the lesson, class or individual learners."></textarea>
    </label>
  </section>

  <section class="card">
    <button class="primary" id="saveReg">Save Register and Generate PDF</button>
  </section>`;

  const draw=()=>{
    c=state.classes.find(x=>x.id===rc.value);
    rl.innerHTML=c.learners.map(l=>`
      <section class="card" style="margin:10px 0">
        <h3>${esc(l.name)}</h3>
        <div class="grid">
          <label style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" data-present="${l.id}" style="width:auto;margin:0"> Present
          </label>
          <label style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" data-late="${l.id}" style="width:auto;margin:0"> Late
          </label>
          <label>Absence reason
            <select data-absence="${l.id}">
              <option value="Unauthorised Absence">Unauthorised absence</option>
              <option value="Authorised Absence">Authorised absence</option>
              <option value="Sick">Sick</option>
            </select>
          </label>
          <label>Behaviour and performance
            <select data-performance="${l.id}">
              <option value="">Not recorded</option>
              <option value="Excellent">Excellent</option>
              <option value="Average">Average</option>
              <option value="Poor">Poor</option>
            </select>
          </label>
        </div>
      </section>`).join("");

    rl.querySelectorAll("[data-present]").forEach(ch=>{
      ch.onchange=()=>{
        const late=rl.querySelector(`[data-late="${ch.dataset.present}"]`);
        if(!ch.checked)late.checked=false;
      };
    });
    rl.querySelectorAll("[data-late]").forEach(ch=>{
      ch.onchange=()=>{
        const present=rl.querySelector(`[data-present="${ch.dataset.late}"]`);
        if(ch.checked)present.checked=true;
      };
    });
  };

  draw();

  rc.onchange=()=>{
    state.current=rc.value;
    save();
    draw();
  };

  all.onclick=()=>{
    rl.querySelectorAll("[data-present]").forEach(x=>x.checked=true);
    rl.querySelectorAll("[data-late]").forEach(x=>x.checked=false);
  };

  none.onclick=()=>{
    rl.querySelectorAll("[data-present]").forEach(x=>x.checked=false);
    rl.querySelectorAll("[data-late]").forEach(x=>x.checked=false);
  };

  saveReg.onclick=async()=>{
    if(!rs.value.trim())return alert("Enter the subject covered.");

    const periods=teachingPeriods(c);
    const attendance={};

    c.learners.forEach(l=>{
      const present=rl.querySelector(`[data-present="${l.id}"]`).checked;
      const late=rl.querySelector(`[data-late="${l.id}"]`).checked;
      const absence=rl.querySelector(`[data-absence="${l.id}"]`).value;
      const performance=rl.querySelector(`[data-performance="${l.id}"]`).value;
      const overallStatus=present?(late?"Late":"Present"):absence;

      attendance[l.id]={
        status:overallStatus,
        performance,
        periods:{}
      };

      periods.forEach(p=>{
        attendance[l.id].periods[p.id]={
          label:p.label,start:p.start,end:p.end,status:overallStatus
        };
      });
    });

    const rec={
      id:id("reg"),
      classId:c.id,
      className:c.name,
      course:c.course,
      date:rd.value,
      subject:rs.value.trim(),
      notes:rn.value.trim(),
      periods,
      attendance
    };

    state.registers.push(rec);
    save();
    await pdf(rec,c);
    alert("Register saved.");
    go("documents");
  };
}
async function pdf(r,c){
  let {jsPDF}=window.jspdf,p=new jsPDF({unit:"mm",format:"a4"}),y=40;
  p.setFillColor(49,92,155);p.rect(0,0,210,30,"F");
  p.setTextColor(255);p.setFont("helvetica","bold");p.setFontSize(18);p.text("Tutor Buddy",14,13);
  p.setFontSize(12);p.text("Daily Register",14,22);
  p.setTextColor(32);p.setFontSize(9);
  [["Class",r.className],["Course",r.course||"Not entered"],["Date",dateUK(r.date)],["Subject",r.subject]].forEach(([a,b],i)=>{
    let x=i%2?110:14;if(i&&i%2===0)y+=9;p.setFont("helvetica","bold");p.text(a+":",x,y);p.setFont("helvetica","normal");p.text(String(b),x+24,y)
  });
  y+=16;
  const periods=r.periods||[];
  const colW=(182-58)/Math.max(periods.length,1);
  p.setFillColor(232,238,247);p.rect(14,y,182,12,"F");
  p.setFont("helvetica","bold");p.text("Learner",17,y+7);
  periods.forEach((per,i)=>p.text(per.label,14+58+i*colW+2,y+7));
  y+=12;
  c.learners.forEach((learner,i)=>{
    if(y>275){p.addPage();y=20}
    p.setFillColor(i%2?248:242,i%2?249:245,i%2?251:248);p.rect(14,y,182,11,"F");
    p.setFont("helvetica","normal");p.text(learner.name,17,y+7);
    periods.forEach((per,j)=>{
      const st=r.attendance[learner.id]?.periods?.[per.id]?.status||r.attendance[learner.id]?.status||"Not marked";
      p.setFontSize(7);p.text(p.splitTextToSize(st,colW-3),14+58+j*colW+2,y+5);
    });
    const perf=r.attendance[learner.id]?.performance||"";
    if(perf){
      p.setFontSize(6.5);
      p.text(`Performance: ${perf}`,17,y+10);
    }
    p.setFontSize(9);y+=13;
  });
  if(r.notes){y+=8;p.setFont("helvetica","bold");p.text("Session notes",14,y);y+=6;p.setFont("helvetica","normal");p.text(p.splitTextToSize(r.notes,182),14,y)}
  p.setFontSize(8);p.setTextColor(100);p.text("Generated by Tutor Buddy • Version "+state.version,14,290);
  p.save(r.className+"-"+r.date+"-Register.pdf")
}
function tracker(){
  if(!state.classes.length){
    app.innerHTML='<section class="card"><div class="empty">Create a class first.</div></section>';
    return;
  }

  let c=cls();
  const allRegs=state.registers.filter(r=>r.classId===c.id).sort((a,b)=>a.date.localeCompare(b.date));
  const firstDate=allRegs[0]?.date||new Date().toISOString().slice(0,10);
  const lastDate=allRegs.at(-1)?.date||new Date().toISOString().slice(0,10);

  app.innerHTML=`<section class="card hero">
    <span class="eyebrow">ATTENDANCE AND LESSON COVERAGE</span>
    <h2>Lesson Tracker</h2>
    <p>Learners stay fixed on the left while you scroll through dated lesson sessions.</p>
  </section>

  <section class="card">
    <div class="grid">
      <label>Class
        <select id="tc">${state.classes.map(x=>`<option value="${x.id}" ${x.id===c.id?"selected":""}>${esc(x.name)}</option>`).join("")}</select>
      </label>
      <label>From date<input id="trackFrom" type="date" value="${firstDate}"></label>
      <label>To date<input id="trackTo" type="date" value="${lastDate}"></label>
    </div>
    <div class="buttons">
      <button class="primary" id="applyTracker">Apply dates</button>
      <button class="secondary" id="downloadTracker">Download tracker PDF</button>
    </div>
    <p class="small">Codes: P = Present, L = Late, A = Authorised absence, U = Unauthorised absence, S = Sick.</p>
  </section>

  <section id="tout"></section>`;

  const draw=()=>{
    c=state.classes.find(x=>x.id===tc.value);
    const from=trackFrom.value,to=trackTo.value;
    const regs=state.registers
      .filter(r=>r.classId===c.id&&(!from||r.date>=from)&&(!to||r.date<=to))
      .sort((a,b)=>a.date.localeCompare(b.date));

    tout.innerHTML=`<section class="card">
      <h3>Attendance tracker</h3>
      ${regs.length?`
      <div class="scroll tracker-wrap">
        <table class="tracker-table">
          <thead>
            <tr>
              <th class="sticky-col sticky-head">Learner</th>
              ${regs.map(r=>`<th class="sticky-head">${esc(r.subject)}<br><span class="small">${dateUK(r.date)}</span></th>`).join("")}
            </tr>
          </thead>
          <tbody>
            ${c.learners.map(l=>{
              const s=stats(c.id,l.id,from,to);
              return `<tr>
                <th class="sticky-col">
                  <button class="secondary learner-link" data-learner-report="${l.id}" style="padding:6px;width:100%;text-align:left">
                    ${esc(l.name)}<br>
                    <strong>${s.pct===null?"—":s.pct+"%"}</strong>
                  </button>
                </th>
                ${regs.map(r=>{
                  const status=r.attendance[l.id]?.status || Object.values(r.attendance[l.id]?.periods||{})[0]?.status || "Not marked";
                  const code=statusCode(status);
                  const perf=r.attendance[l.id]?.performance||"";
                  const cls=status==="Present"?"yes":status==="Late"?"late":"no";
                  return `<td class="${cls}">
                    <strong>${code}</strong>
                    ${perf?`<br><span class="small">${esc(perf)}</span>`:""}
                  </td>`;
                }).join("")}
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>`:'<div class="empty">No lessons recorded in this date range.</div>'}
    </section>`;

    tout.querySelectorAll("[data-learner-report]").forEach(b=>{
      b.onclick=()=>learnerReport(c.id,b.dataset.learnerReport,from,to);
    });
  };

  draw();

  tc.onchange=()=>{
    state.current=tc.value;
    save();
    c=cls();
    const regs=state.registers.filter(r=>r.classId===c.id).sort((a,b)=>a.date.localeCompare(b.date));
    trackFrom.value=regs[0]?.date||new Date().toISOString().slice(0,10);
    trackTo.value=regs.at(-1)?.date||new Date().toISOString().slice(0,10);
    draw();
  };

  applyTracker.onclick=draw;
  downloadTracker.onclick=()=>trackerPdf(c,trackFrom.value,trackTo.value);
}
function documents(){let regs=[...state.registers].sort((a,b)=>b.date.localeCompare(a.date));app.innerHTML=`<section class="card hero"><span class="eyebrow">SAVED RECORDS</span><h2>Documents</h2></section><section class="card">${regs.length?regs.map(r=>`<div class="row"><div><b>${esc(r.className)} — ${dateUK(r.date)}</b><div class="small">${esc(r.subject)}</div></div><div class="buttons"><button class="secondary" data-dl="${r.id}">Download PDF</button><button class="danger" data-del="${r.id}">Delete</button></div></div>`).join(""):'<div class="empty">No documents yet.</div>'}</section>`;app.querySelectorAll("[data-dl]").forEach(b=>b.onclick=()=>{let r=state.registers.find(x=>x.id===b.dataset.dl),c=state.classes.find(x=>x.id===r.classId);pdf(r,c)});app.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{if(confirm("Delete this register?")){state.registers=state.registers.filter(x=>x.id!==b.dataset.del);save();documents()}})}
function settings(){app.innerHTML=`<section class="card hero"><span class="eyebrow">TUTOR PROFILE</span><h2>Settings</h2></section><section class="card"><div class="grid"><label>Name<input id="pn" value="${esc(state.profile.name)}"></label><label>College/provider<input id="pc" value="${esc(state.profile.college)}"></label><label>Email<input id="pe" value="${esc(state.profile.email)}"></label></div><button class="primary" id="sp">Save profile</button></section><section class="card"><h3>Backup</h3><div class="buttons"><button class="secondary" id="ex">Export backup</button><label class="secondary" style="margin:0">Import backup<input id="im" type="file" accept=".json" style="display:none"></label></div></section><section class="card"><h3>Tutor Buddy</h3><p>Version ${state.version}</p><button class="danger" id="reset">Reset all data</button></section>`;sp.onclick=()=>{state.profile={name:pn.value.trim(),college:pc.value.trim(),email:pe.value.trim()};save();alert("Profile saved.")};ex.onclick=()=>{let b=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="Tutor-Buddy-Backup.json";a.click()};im.onchange=async()=>{try{state=JSON.parse(await im.files[0].text());save();render()}catch(e){alert("Invalid backup.")}};reset.onclick=()=>{if(confirm("Delete all classes and registers?")){localStorage.removeItem(KEY);state=structuredClone(blank);render()}}}
if("serviceWorker"in navigator)addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js"));render();
</script></body></html>
