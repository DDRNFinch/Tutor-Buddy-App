<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#315c9b"><title>Tutor Buddy</title><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{--b:#315c9b;--bd:#203f70;--bg:#f4f6f9;--c:#fff;--t:#202630;--m:#6d7680;--l:#d9dee5;--g:#16845b;--a:#d79b21;--r:#a92323}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:Arial,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}
header{background:linear-gradient(135deg,var(--bd),var(--b));color:#fff;padding:16px;position:sticky;top:0;z-index:9}.brand{max-width:1100px;margin:auto;display:flex;gap:12px;align-items:center}.brand img{width:48px;border-radius:12px}.brand h1{margin:0;font-size:22px}.brand p{margin:2px 0 0;font-size:13px}
nav{max-width:1100px;margin:12px auto 0;display:grid;grid-template-columns:repeat(6,1fr);gap:8px}nav button{border:0;border-radius:10px;padding:9px;background:#ffffff22;color:#fff;font-weight:700}nav button.active{background:#fff;color:var(--bd)}
.mobile{display:none;max-width:1100px;margin:10px auto 0}.mobile select{width:100%;padding:10px;border:0;border-radius:10px}main{max-width:1100px;margin:auto;padding:16px}
.card{background:#fff;border:1px solid var(--l);border-radius:15px;padding:16px;margin-bottom:14px;box-shadow:0 8px 22px #1b27360d}.hero{background:linear-gradient(135deg,#edf4ff,#fff)}
h2,h3{margin-top:0}.eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;color:var(--b)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.grid3,.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
label{display:block;font-weight:700;font-size:13px;margin-bottom:10px}input,select,textarea{width:100%;padding:10px;border:1px solid var(--l);border-radius:10px;background:#fff;margin-top:6px}textarea{min-height:90px}
.primary,.secondary,.danger{border:0;border-radius:10px;padding:10px 13px;font-weight:800}.primary{background:var(--b);color:#fff}.secondary{background:#e9eef5}.danger{background:#fde8e8;color:var(--r)}.buttons{display:flex;gap:8px;flex-wrap:wrap}
.metric,.actions button{background:#fff;border:1px solid var(--l);border-radius:13px;padding:14px;text-align:left}.metric span,.small{font-size:12px;color:var(--m)}.metric strong{font-size:26px}.actions b{display:block;margin:7px 0 4px}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--l)}.row:last-child{border-bottom:0}.badge{padding:4px 8px;border-radius:99px;font-size:11px;font-weight:800}.green{background:#e5f5ee;color:var(--g)}.amber{background:#fff1cf;color:#8d6000}.red{background:#fde6e6;color:var(--r)}.grey{background:#edf0f3}
.att{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.att label{margin:0;display:flex;gap:6px;align-items:center}.att input{width:auto;margin:0}.att select{min-width:155px;margin:0}
table{border-collapse:collapse;width:100%;font-size:12px}th,td{border:1px solid var(--l);padding:7px;text-align:left}th{background:#eef3f9}.scroll{overflow:auto}.yes{background:#eefaf4}.late{background:#fff8e8}.no{background:#fff2f2}.empty{text-align:center;color:var(--m);padding:22px}
@media(max-width:760px){nav{display:none}.mobile{display:block}.grid,.grid3,.actions{grid-template-columns:1fr}main{padding:10px}.row{align-items:flex-start;flex-direction:column}.buttons>*{flex:1}}

.tracker-wrap{max-height:70vh;overflow:auto}
.tracker-table{min-width:max-content}
.tracker-table th,.tracker-table td{min-width:130px;text-align:center}
.tracker-table .sticky-col{position:sticky;left:0;z-index:3;background:#fff;min-width:180px;text-align:left}
.tracker-table .sticky-head{position:sticky;top:0;z-index:4;background:#eef3f9}
.tracker-table .sticky-col.sticky-head{z-index:5}


.register-table{min-width:max-content}
.register-table th,.register-table td{min-width:145px;text-align:center;vertical-align:top}
.register-table .sticky-col{position:sticky;left:0;z-index:3;background:#fff;min-width:180px;text-align:left}
.register-table .sticky-head{position:sticky;top:0;z-index:4;background:#eef3f9}
.register-table .sticky-col.sticky-head{z-index:5}
.tick-line{display:flex;align-items:center;gap:6px;margin:4px 0;font-weight:600}
.tick-line input{width:auto;margin:0}


.status-stack{display:flex;gap:6px;flex-wrap:wrap}
details summary{cursor:pointer;padding:10px 0}


.status-text{font-weight:800;background:none!important;padding:0!important;border-radius:0!important;display:inline}
.status-text.green{color:var(--g)}
.status-text.amber{color:#a36d00}
.status-text.red{color:var(--r)}
.status-text.grey{color:var(--m)}
.tracker-table th,.tracker-table td{padding:6px;min-width:118px}
.tracker-table .sticky-col{min-width:165px}

</style></head><body>
<header><div class="brand"><img src="icon-192.png"><div><h1>Tutor Buddy</h1><p>Registers, attendance and lesson tracking</p></div></div><nav id="nav"></nav><div class="mobile"><select id="mnav"></select></div></header>
<main id="app"></main><script>
const KEY="tutorBuddyV1";const blank={profile:{name:"",college:"",email:""},classes:[],registers:[],diaryNotes:[],current:null,version:"1.0.14"};let state=load(),route="home";
function load(){try{return Object.assign(structuredClone(blank),JSON.parse(localStorage.getItem(KEY)||"{}"))}catch(e){return structuredClone(blank)}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function id(p){return p+"-"+Date.now()+"-"+Math.random().toString(36).slice(2,7)}function esc(s=""){return String(s).replace(/[&<>"']/g,x=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[x]))}
function dateUK(v){return v?new Date(v+"T12:00:00").toLocaleDateString("en-GB"):""}const R=[["home","🏠 Home"],["classes","👥 Classes"],["register","✅ New Register"],["tracker","📈 Progress Tracker"],["documents","📂 Records"],["settings","⚙️ Settings"]];
function go(x){route=x;render()}document.addEventListener("click",e=>{
  const install=e.target.closest("[data-install-app]");
  if(install){installTutorBuddy();return}
  const b=e.target.closest("[data-route]");
  if(b)go(b.dataset.route);
});mnav.onchange=()=>go(mnav.value);

let deferredInstallPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  deferredInstallPrompt=e;
  document.querySelectorAll("[data-install-app]").forEach(b=>b.classList.remove("hidden"));
});
window.addEventListener("appinstalled",()=>{
  deferredInstallPrompt=null;
  document.querySelectorAll("[data-install-app]").forEach(b=>b.classList.add("hidden"));
});
function isInstalledApp(){
  return window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone===true;
}
async function installTutorBuddy(){
  if(isInstalledApp()){alert("Tutor Buddy is already installed.");return;}
  if(deferredInstallPrompt){deferredInstallPrompt.prompt();await deferredInstallPrompt.userChoice;deferredInstallPrompt=null;return;}
  if(/iphone|ipad|ipod/i.test(navigator.userAgent)){alert("Open Tutor Buddy in Safari, tap Share, then choose Add to Home Screen.");}
  else{alert("Open the browser menu and choose Install app or Add to Home screen.");}
}

function render(){nav.innerHTML=R.map(([k,l])=>`<button data-route="${k}" class="${route===k?"active":""}">${l}</button>`).join("");mnav.innerHTML=R.map(([k,l])=>`<option value="${k}" ${route===k?"selected":""}>${l}</option>`).join("");({home,classes,register,tracker,documents,settings}[route]||home)();
  if(isInstalledApp())document.querySelectorAll("[data-install-app]").forEach(b=>b.classList.add("hidden"));
}
function cls(){return state.classes.find(x=>x.id===state.current)||state.classes[0]||null}
function dailyLateCount(record,learnerId){
  return Object.values(record.attendance[learnerId]?.periods||{}).filter(p=>p.status==="Late").length;
}
function dayPercentage(record,learnerId){
  const periods=Object.values(record.attendance[learnerId]?.periods||{});
  if(!periods.length)return null;
  const attended=periods.filter(p=>p.status==="Present"||p.status==="Late").length;
  return Math.round(attended/periods.length*100);
}
function stats(cid,lid,from="",to=""){
  const regs=state.registers.filter(r=>r.classId===cid&&(!from||r.date>=from)&&(!to||r.date<=to));
  const values=regs.map(r=>dayPercentage(r,lid)).filter(v=>v!==null);
  const lateCount=regs.reduce((sum,r)=>sum+dailyLateCount(r,lid),0);
  return {
    pct:values.length?Math.round(values.reduce((a,b)=>a+b,0)/values.length):null,
    totalDays:values.length,
    lateCount
  };
}

function averagePerformance(classId,learnerId,from="",to=""){
  const map={Poor:1,Average:2,Excellent:3};
  const values=state.registers.filter(r=>r.classId===classId&&(!from||r.date>=from)&&(!to||r.date<=to)).map(r=>map[r.attendance[learnerId]?.performance]).filter(v=>v);
  if(!values.length)return "Not recorded";
  const avg=values.reduce((a,b)=>a+b,0)/values.length;
  return avg>=2.5?"Excellent":avg>=1.5?"Average":"Poor";
}
function classAveragePerformanceLabel(classId){
  const c=state.classes.find(x=>x.id===classId);
  if(!c||!c.learners.length)return "Not recorded";
  const map={Poor:1,Average:2,Excellent:3};
  const vals=c.learners.map(l=>map[averagePerformance(classId,l.id)]).filter(v=>v);
  if(!vals.length)return "Not recorded";
  const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
  return avg>=2.5?"Excellent":avg>=1.5?"Average":"Poor";
}
function performanceClass(v){return v==="Excellent"?"green":v==="Average"?"amber":v==="Poor"?"red":"grey";}
function needsAttention(){
  const items=[];
  state.classes.forEach(c=>{
    c.learners.forEach(l=>{
      const s=stats(c.id,l.id);
      const perf=averagePerformance(c.id,l.id);
      if(s.pct!==null&&s.pct<85)items.push({learner:l.name,className:c.name,reason:`Attendance ${s.pct}%`,priority:1});
      if(s.lateCount>=5)items.push({learner:l.name,className:c.name,reason:`L×${s.lateCount}`,priority:2});
      if(perf==="Poor")items.push({learner:l.name,className:c.name,reason:"Performance Poor",priority:1});
    });
  });
  return items.sort((a,b)=>a.priority-b.priority||a.learner.localeCompare(b.learner)).slice(0,12);
}
function latestRegisterForClass(classId){
  return [...state.registers].filter(r=>r.classId===classId).sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
}
function openClassSummary(classId){
  state.current=classId;save();classSummary(classId);
}

function classLateCount(classId){
  const c=state.classes.find(x=>x.id===classId);
  if(!c)return 0;
  return c.learners.reduce((n,l)=>n+stats(classId,l.id).lateCount,0);
}

function lateClass(count){return count===0?"green":count===1?"amber":"red";}
function fourWeeksAgo(){
  const d=new Date();d.setDate(d.getDate()-28);return d.toISOString().slice(0,10);
}
function learnerIssueSummary(classId,learnerId){
  const c=state.classes.find(x=>x.id===classId);
  const l=c?.learners.find(x=>x.id===learnerId);
  const from=fourWeeksAgo(),to=new Date().toISOString().slice(0,10);
  const s=stats(classId,learnerId,from,to);
  const perf=averagePerformance(classId,learnerId,from,to);
  const issues=[];
  if(s.pct!==null&&s.pct<85)issues.push("attendance");
  if(s.lateCount>=3)issues.push("lateness");
  if(perf==="Poor")issues.push("performance");
  if(!issues.length)return null;

  let description="";
  if(issues.length>1){
    const detail=[];
    if(issues.includes("attendance"))detail.push(`attendance has averaged ${s.pct}%`);
    if(issues.includes("lateness"))detail.push(`${s.lateCount} late arrivals have been recorded`);
    if(issues.includes("performance"))detail.push("performance has been mostly Poor");
    description=`${l.name} has shown a combination of concerns over the past 4 weeks: ${detail.join(", ")}. A structured improvement plan and regular support are recommended.`;
  }else if(issues[0]==="attendance"){
    description=`${l.name} has averaged ${s.pct}% attendance over the past 4 weeks. Improving attendance should now be prioritised to help them keep up with practical and theory work.`;
  }else if(issues[0]==="lateness"){
    description=`${l.name} has been consistently late over the past 4 weeks, with ${s.lateCount} recorded late arrivals. Punctuality should now be discussed to prevent this becoming a longer-term pattern.`;
  }else{
    description=`${l.name} has received mostly Poor performance ratings over the past 4 weeks. Additional support, clearer expectations and regular feedback may help improve engagement and classroom performance.`;
  }
  return {classId,learnerId,learner:l.name,className:c.name,from,to,attendance:s.pct,lateCount:s.lateCount,performance:perf,issues,description};
}

function fourWeekAttention(){
  const items=[];
  state.classes.forEach(c=>c.learners.forEach(l=>{
    const item=learnerIssueSummary(c.id,l.id);
    if(item)items.push(item);
  }));
  return items.sort((a,b)=>(a.attendance??100)-(b.attendance??100)||b.lateCount-a.lateCount);
}

function classDashboardStats(classId){
  const c=state.classes.find(x=>x.id===classId);
  const regs=state.registers.filter(r=>r.classId===classId);
  if(!c||!regs.length)return {attendance:null,lateness:null,performance:null,registers:0};

  const attendanceValues=[];
  let lateSessions=0,totalSessions=0;
  let perfPoints=0,perfCount=0;
  const perfMap={Excellent:100,Average:65,Poor:30};

  c.learners.forEach(l=>{
    const s=stats(classId,l.id);
    if(s.pct!==null)attendanceValues.push(s.pct);
  });

  regs.forEach(r=>{
    c.learners.forEach(l=>{
      const periods=Object.values(r.attendance[l.id]?.periods||{});
      periods.forEach(p=>{
        totalSessions++;
        if(p.status==="Late")lateSessions++;
      });
      const perf=r.attendance[l.id]?.performance;
      if(perfMap[perf]!==undefined){
        perfPoints+=perfMap[perf];
        perfCount++;
      }
    });
  });

  return {
    attendance:attendanceValues.length?Math.round(attendanceValues.reduce((a,b)=>a+b,0)/attendanceValues.length):null,
    lateness:totalSessions?Math.round((lateSessions/totalSessions)*100):null,
    performance:perfCount?Math.round(perfPoints/perfCount):null,
    registers:regs.length
  };
}
function overallDashboardStats(){
  const rows=state.classes.map(c=>classDashboardStats(c.id)).filter(x=>x.registers>0);
  const avg=key=>{
    const vals=rows.map(x=>x[key]).filter(v=>v!==null);
    return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):null;
  };
  return {attendance:avg("attendance"),lateness:avg("lateness"),performance:avg("performance")};
}
let homeChart=null;
function openClassDashboard(classId){
  state.current=classId;
  save();
  go("tracker");
}
function home(){
  const recent=[...state.registers].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  const attention=fourWeekAttention();
  const today=new Date().toISOString().slice(0,10);
  const diary=(state.diaryNotes||[]).filter(n=>n.date===today);

  app.innerHTML=`<section class="card hero">
    <span class="eyebrow">DAILY TUTOR TOOLKIT</span>
    <h2>Welcome${state.profile.name?", "+esc(state.profile.name):""}</h2>
    <p>Compare classes, spot learner concerns and identify lesson trends that may need a different delivery approach.</p>
  </section>

  <section class="card">
    <h3>Quick actions</h3>
    <div class="actions">
      <button data-route="register">✅<b>New register</b><span class="small">Start a fresh daily register.</span></button>
      <button id="copyPreviousHome">📋<b>Copy previous register</b><span class="small">Reuse the latest class and lesson details.</span></button>
      <button data-route="tracker">📊<b>Progress tracker</b><span class="small">View attendance, lateness and performance.</span></button>
    </div>
  </section>

  <section class="card">
    <h3>Class overview</h3>
    ${state.classes.length?`<div class="actions">${state.classes.map(c=>{
      const d=classDashboardStats(c.id),perf=classAveragePerformanceLabel(c.id),last=latestRegisterForClass(c.id);
      return `<button data-class-summary="${c.id}">
        👥<b>${esc(c.name)}</b>
        <span class="small">
          ${c.learners.length} learners<br>
          Attendance ${d.attendance===null?"—":d.attendance+"%"}<br>
          Late marks L×${classLateCount(c.id)}<br>
          Performance ${perf}<br>
          Last register ${last?dateUK(last.date):"None"}
        </span>
      </button>`;
    }).join("")}</div>`:'<div class="empty">No classes created yet.</div>'}
  </section>


  <section class="card">
    <h3>🤝 Learners to Support</h3>
    <p class="small">Summaries are based on the learner's most recent 4 weeks of registers.</p>
    ${attention.length?attention.map(x=>`<div class="row">
      <div>
        <b>${esc(x.learner)}</b>
        <div class="small">${esc(x.className)}</div>
        <p style="margin:6px 0 0">${esc(x.description)}</p>
      </div>
      <button class="secondary" data-generate-concern="${x.classId}|${x.learnerId}">Generate Learner Support Report</button>
    </div>`).join(""):'<div class="empty">No learners currently flagged.</div>'}
  </section>

  <section class="card">
    <h3>Today's notes</h3>
    <div class="grid">
      <label>New note<input id="diaryText" placeholder="e.g. Order more timber, EPA mock next week"></label>
      <label>Date<input id="diaryDate" type="date" value="${today}"></label>
    </div>
    <button class="primary" id="addDiary">Add note</button>
    <div id="diaryList">${diary.length?diary.map(n=>`<div class="row"><div>${esc(n.text)}</div><button class="danger" data-delete-note="${n.id}">Delete</button></div>`).join(""):'<div class="empty">No notes for today.</div>'}</div>
  </section>

  <section class="card"><h3>Recent registers</h3>
    ${recent.length?recent.map(r=>`<div class="row"><div><b>${esc(r.className)}</b><div class="small">${dateUK(r.date)} • ${esc(r.subject)}</div></div><button class="secondary" data-edit-recent="${r.id}">Open</button></div>`).join(""):'<div class="empty">No registers saved yet.</div>'}
  </section>`;

  app.querySelectorAll("[data-class-summary]").forEach(b=>b.onclick=()=>openClassSummary(b.dataset.classSummary));
  app.querySelectorAll("[data-generate-concern]").forEach(b=>b.onclick=()=>{const [classId,learnerId]=b.dataset.generateConcern.split("|");concernPdf(classId,learnerId)});
  app.querySelectorAll("[data-edit-recent]").forEach(b=>b.onclick=()=>register(b.dataset.editRecent));
  copyPreviousHome.onclick=()=>copyPreviousRegister();
  addDiary.onclick=()=>{
    const text=diaryText.value.trim();if(!text)return;
    state.diaryNotes ||= [];
    state.diaryNotes.push({id:id("note"),date:diaryDate.value,text});
    save();home();
  };
  app.querySelectorAll("[data-delete-note]").forEach(b=>b.onclick=()=>{
    state.diaryNotes=state.diaryNotes.filter(n=>n.id!==b.dataset.deleteNote);save();home();
  });
}
function classSummary(classId){
  const c=state.classes.find(x=>x.id===classId);
  if(!c){go("classes");return}
  const d=classDashboardStats(classId);
  const perf=classAveragePerformanceLabel(classId);
  const last=latestRegisterForClass(classId);

  app.innerHTML=`<section class="card"><button class="secondary" data-route="home">← Back to Home</button></section>
  <section class="card hero"><span class="eyebrow">CLASS SUMMARY</span><h2>${esc(c.name)}</h2><p>${esc(c.course||"Course not entered")} • ${c.learners.length} learners</p></section>
  <section class="grid3">
    <div class="metric"><span>Attendance</span><strong>${d.attendance===null?"—":d.attendance+"%"}</strong></div>
    <div class="metric"><span>Late marks</span><strong>L×${classLateCount(c.id)}</strong></div>
    <div class="metric"><span>Performance</span><strong style="font-size:18px">${perf}</strong></div>
  </section>
  <section class="card"><div class="actions">
    <button id="classNewRegister">✅<b>New register</b><span class="small">Create today's register.</span></button>
    <button id="classCopyRegister">📋<b>Copy previous</b><span class="small">${last?dateUK(last.date)+" • "+esc(last.subject):"No previous register"}</span></button>
    <button id="classTracker">📊<b>View tracker</b><span class="small">Open learner progress.</span></button>
  </div></section>
  <section class="card"><h3>Learners</h3>${c.learners.map(l=>{
    const s=stats(c.id,l.id),p=averagePerformance(c.id,l.id);
    return `<div class="row"><div><b>${esc(l.name)}</b><div class="small">Attendance ${s.pct===null?"—":s.pct+"%"} • L×${s.lateCount}</div></div><span class="badge ${performanceClass(p)}">${p}</span></div>`;
  }).join("")||'<div class="empty">No learners added.</div>'}</section>`;

  classNewRegister.onclick=()=>{state.current=c.id;save();register()};
  classCopyRegister.onclick=()=>{state.current=c.id;save();copyPreviousRegister()};
  classTracker.onclick=()=>{state.current=c.id;save();go("tracker")};
}
function classes(){app.innerHTML=`<section class="card hero"><span class="eyebrow">CLASS SETUP</span><h2>Classes</h2><p>Create a class with usual times, then add learners.</p></section><section class="card"><button class="primary" id="newClass">+ Create class</button></section><section class="card"><h3>Your classes</h3><div id="list"></div></section>`;drawClasses();newClass.onclick=()=>classForm()}
function drawClasses(){list.innerHTML=state.classes.length?state.classes.map(c=>`<div class="row"><div><b>${esc(c.name)}</b><div class="small">${c.learners.length} learners • ${c.start}-${c.end} • ${c.breaks?.length||0} break${(c.breaks?.length||0)===1?"":"s"}</div></div><div class="buttons"><button class="secondary" data-edit="${c.id}">Edit</button><button class="primary" data-use="${c.id}">Use</button></div></div>`).join(""):'<div class="empty">No classes created.</div>';list.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>classForm(b.dataset.edit));list.querySelectorAll("[data-use]").forEach(b=>b.onclick=()=>{state.current=b.dataset.use;save();go("register")})}
function classForm(cid){
  let old=state.classes.find(x=>x.id===cid),

  c.breaks ||= [];

      <label>Class name<input id="cn" value="${esc(c.name)}" placeholder="e.g. Site Carpentry Year 1"></label>
      <label>Course<input id="cc" value="${esc(c.course)}"></label>

function learnerPage(c){app.innerHTML=`<section class="card"><h2>${esc(c.name)} — Learners</h2><div class="grid"><label>Name<input id="ln"></label><label>Learner ID (optional)<input id="lr"></label></div><button class="primary" id="add">+ Add learner</button></section><section class="card"><div id="ll"></div></section><section class="card"><div class="buttons"><button class="secondary" data-route="classes">Cancel</button><button class="primary" id="saveClass">Save class</button></div></section>`;let draw=()=>{ll.innerHTML=c.learners.length?c.learners.map(l=>`<div class="row"><div><b>${esc(l.name)}</b><div class="small">${esc(l.ref||"")}</div></div><button class="danger" data-rm="${l.id}">Remove</button></div>`).join(""):'<div class="empty">No learners added.</div>';ll.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{c.learners=c.learners.filter(x=>x.id!==b.dataset.rm);draw()})};draw();add.onclick=()=>{if(!ln.value.trim())return;c.learners.push({id:id("learner"),name:ln.value.trim(),ref:lr.value.trim()});ln.value="";lr.value="";draw()};saveClass.onclick=()=>{let i=state.classes.findIndex(x=>x.id===c.id);if(i>=0)state.classes[i]=c;else state.classes.push(c);state.current=c.id;save();go("classes")}}

function teachingPeriods(c){
  const breaks=[...(c.breaks||[])].filter(b=>b.start&&b.end).sort((a,b)=>a.start.localeCompare(b.start));
  const periods=[];
  let current=c.start;
  breaks.forEach((b,i)=>{
    if(current<b.start)periods.push({id:`p${periods.length}`,start:current,end:b.start,label:`${current}–${b.start}`});
    current=b.end;
  });
  if(current<c.end)periods.push({id:`p${periods.length}`,start:current,end:c.end,label:`${current}–${c.end}`});
  return periods;
}

function copyPreviousRegister(){
  if(!state.registers.length){alert("There is no previous register to copy.");return}
  const preferred=state.current?latestRegisterForClass(state.current):null;
  const previous=preferred||[...state.registers].sort((a,b)=>b.date.localeCompare(a.date))[0];
  register(null,previous.id);
}
function register(editId=null,copyId=null){
  if(!state.classes.length){
    app.innerHTML=`<section class="card"><h2>Create a class first</h2><button class="primary" data-route="classes">Create class</button></section>`;
    return;
  }
  const editing=editId?state.registers.find(r=>r.id===editId):null;
  const copying=copyId?state.registers.find(r=>r.id===copyId):null;
  let c=(editing||copying)?state.classes.find(x=>x.id===(editing||copying).classId):cls();
  state.current=c.id;
  app.innerHTML=`<section class="card hero"><span class="eyebrow">DAILY REGISTER</span><h2>${editing?"Edit":copying?"Copy Previous":"Create"} Register</h2><p>Tick Present for each session. Tick Late where needed. Unticked Present means absent.</p></section>
  <section class="card"><div class="grid">
    <label>Class<select id="rc">${state.classes.map(x=>`<option value="${x.id}" ${x.id===c.id?"selected":""}>${esc(x.name)}</option>`).join("")}</select></label>
    <label>Date<input id="rd" type="date" value="${editing?.date||new Date().toISOString().slice(0,10)}"></label>
    <label>Subject covered<input id="rs" value="${esc(editing?.subject||copying?.subject||"")}" placeholder="e.g. Installing floor joists"></label>
  </div></section>
  <section class="card"><div class="buttons"><button class="secondary" id="all">Mark all present</button><button class="secondary" id="none">Clear all</button></div><div id="rl" class="scroll"></div></section>
  <section class="card"><label>Notes for today<textarea id="rn" placeholder="Add any comments about the lesson, class or individual learners.">${esc(editing?.notes||"")}</textarea></label></section>
  <section class="card"><button class="primary" id="saveReg">${editing?"Update Register and Generate PDF":"Save Register and Generate PDF"}</button></section>`;

  const draw=()=>{
    c=state.classes.find(x=>x.id===rc.value);
    const periods=teachingPeriods(c);
    rl.innerHTML=`<table class="register-table"><thead><tr><th class="sticky-col sticky-head">Learner</th>
      ${periods.map((p,i)=>`<th class="sticky-head">Session ${i+1}<br><span class="small">${p.label}</span></th>`).join("")}
      <th class="sticky-head">Performance</th></tr></thead><tbody>
      ${c.learners.map(l=>`<tr><th class="sticky-col">${esc(l.name)}</th>
        ${periods.map(p=>`<td>
          <label class="tick-line"><input type="checkbox" data-present="${l.id}-${p.id}" ${["Present","Late"].includes(editing?.attendance?.[l.id]?.periods?.[p.id]?.status)?"checked":""}> Present</label>
          <label class="tick-line"><input type="checkbox" data-late="${l.id}-${p.id}" ${editing?.attendance?.[l.id]?.periods?.[p.id]?.status==="Late"?"checked":""}> Late</label>
        </td>`).join("")}
        <td>
          <label class="tick-line"><input type="radio" name="perf-${l.id}" value="Excellent" ${editing?.attendance?.[l.id]?.performance==="Excellent"?"checked":""}> Excellent</label>
          <label class="tick-line"><input type="radio" name="perf-${l.id}" value="Average" ${editing?.attendance?.[l.id]?.performance==="Average"?"checked":""}> Average</label>
          <label class="tick-line"><input type="radio" name="perf-${l.id}" value="Poor" ${editing?.attendance?.[l.id]?.performance==="Poor"?"checked":""}> Poor</label>
        </td></tr>`).join("")}
      </tbody></table>`;
    rl.querySelectorAll("[data-present]").forEach(ch=>ch.onchange=()=>{const late=rl.querySelector(`[data-late="${ch.dataset.present}"]`);if(!ch.checked)late.checked=false});
    rl.querySelectorAll("[data-late]").forEach(ch=>ch.onchange=()=>{if(ch.checked)rl.querySelector(`[data-present="${ch.dataset.late}"]`).checked=true});
  };
  draw();
  if(editing||copying)rc.disabled=true;
  rc.onchange=()=>{state.current=rc.value;save();draw()};
  all.onclick=()=>{rl.querySelectorAll("[data-present]").forEach(x=>x.checked=true);rl.querySelectorAll("[data-late]").forEach(x=>x.checked=false)};
  none.onclick=()=>{rl.querySelectorAll("[data-present]").forEach(x=>x.checked=false);rl.querySelectorAll("[data-late]").forEach(x=>x.checked=false)};
  saveReg.onclick=async()=>{
    if(!rs.value.trim())return alert("Enter the subject covered.");
    const periods=teachingPeriods(c),attendance={};
    c.learners.forEach(l=>{
      attendance[l.id]={periods:{},performance:rl.querySelector(`input[name="perf-${l.id}"]:checked`)?.value||""};
      periods.forEach(p=>{
        const present=rl.querySelector(`[data-present="${l.id}-${p.id}"]`).checked;
        const late=rl.querySelector(`[data-late="${l.id}-${p.id}"]`).checked;
        attendance[l.id].periods[p.id]={label:p.label,start:p.start,end:p.end,status:present?(late?"Late":"Present"):"Absent"};
      });
    });
    const rec={id:editing?.id||id("reg"),classId:c.id,className:c.name,course:c.course,date:rd.value,subject:rs.value.trim(),notes:rn.value.trim(),periods,attendance};
    if(editing){
      const idx=state.registers.findIndex(r=>r.id===editing.id);
      state.registers[idx]=rec;
    }else{
      state.registers.push(rec);
    }
    save();await pdf(rec,c);alert(editing?"Register updated.":"Register saved.");go("documents");
  };
}
async function pdf(r,c){
  let {jsPDF}=window.jspdf,p=new jsPDF({unit:"mm",format:"a4",orientation:"landscape"}),y=38;
  addPdfHeader(p,"Daily Class Register",r.className);

  p.setTextColor(32);p.setFontSize(8);p.text(`Subject: ${r.subject}`,14,36);
  addPdfInfoPanel(p,[["Tutor",state.profile.name||"Not entered"],["College",state.profile.college||"Not entered"],["Generated",pdfGeneratedDate()],["Date",dateUK(r.date)]],215,30,68);

  const periods=r.periods||[],left=14,nameW=38,lateW=16,perfW=25;
  const sessionW=(269-nameW-lateW-perfW)/Math.max(periods.length,1);

  y=50;
  p.setFillColor(232,238,247);p.rect(left,y,269,13,"F");
  p.setFont("helvetica","bold");p.text("Learner",left+2,y+7);
  periods.forEach((per,i)=>p.text(`S${i+1} ${per.label}`,left+nameW+i*sessionW+2,y+7));
  p.text("Late",left+nameW+periods.length*sessionW+2,y+7);
  p.text("Performance",left+nameW+periods.length*sessionW+lateW+2,y+7);
  y+=13;

  c.learners.forEach((l,i)=>{
    if(y>188){p.addPage("a4","landscape");y=18}
    p.setFillColor(i%2?248:242,i%2?249:245,i%2?251:248);p.rect(left,y,269,12,"F");
    p.setFont("helvetica","normal");p.text(l.name,left+2,y+7);
    periods.forEach((per,j)=>{
      const st=r.attendance[l.id]?.periods?.[per.id]?.status||"Absent";
      p.text(st,left+nameW+j*sessionW+2,y+7);
    });
    p.setFont("helvetica","bold");
    p.text(`L×${dailyLateCount(r,l.id)}`,left+nameW+periods.length*sessionW+2,y+7);
    p.setFont("helvetica","normal");
    p.text(r.attendance[l.id]?.performance||"—",left+nameW+periods.length*sessionW+lateW+2,y+7);
    y+=12;
  });

  if(r.notes){
    y+=6;p.setFont("helvetica","bold");p.text("Notes for today",14,y);
    y+=5;p.setFont("helvetica","normal");p.text(p.splitTextToSize(r.notes,269),14,y);
  }
  addPdfFooters(p,false);p.save(`${r.className}-${r.date}-Daily-Class-Register.pdf`);
}

function pdfGeneratedDate(){return new Date().toLocaleDateString("en-GB");}
function addPdfHeader(pdf,title,subtitle=""){
  const w=pdf.internal.pageSize.getWidth();
  pdf.setFillColor(49,92,155);pdf.rect(0,0,w,26,"F");
  pdf.setTextColor(255);pdf.setFont("helvetica","bold");pdf.setFontSize(17);pdf.text(title,14,11);

function addPdfInfoPanel(pdf,items,x,y,w){
  pdf.setFillColor(242,246,251);pdf.roundedRect(x,y,w,28,2,2,"F");
  pdf.setFontSize(7.5);let yy=y+6;
  items.forEach(([label,value])=>{
    pdf.setFont("helvetica","bold");pdf.text(`${label}:`,x+4,yy);
    pdf.setFont("helvetica","normal");pdf.text(pdf.splitTextToSize(String(value||"Not entered"),w-27),x+23,yy);
    yy+=6;
  });
}
function addPdfFooters(pdf,confidential=false){
  const pages=pdf.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    pdf.setPage(i);
    const w=pdf.internal.pageSize.getWidth(),h=pdf.internal.pageSize.getHeight();
    pdf.setDrawColor(210,214,220);pdf.line(14,h-12,w-14,h-12);
    pdf.setFont("helvetica","normal");pdf.setFontSize(7);pdf.setTextColor(100);
    pdf.text(confidential?"Confidential – Intended for the learner, employer and authorised college staff only.":"Generated by Tutor Buddy",14,h-7);
    pdf.text(`Generated ${pdfGeneratedDate()} • Page ${i} of ${pages}`,w-14,h-7,{align:"right"});
  }
}
function smartActionForIssue(issue){
  if(!issue)return "Work with the tutor to agree a clear and achievable improvement plan.";
  if(issue.issues.length>1)return "Create a weekly improvement plan covering attendance, punctuality and classroom engagement, supported by regular tutor feedback.";
  if(issue.issues.includes("attendance"))return "Attend every scheduled lesson over the next 4 weeks and notify the tutor promptly if an absence is unavoidable.";
  if(issue.issues.includes("lateness"))return "Arrive at least 10 minutes before each lesson with all required PPE, tools and learning materials ready.";
  return "Improve lesson engagement by completing all activities, asking questions when unsure and maintaining focus throughout each session.";
}

async function concernPdf(classId,learnerId){
  const c=state.classes.find(x=>x.id===classId),l=c?.learners.find(x=>x.id===learnerId);
  if(!c||!l)return;
  const from=fourWeeksAgo(),to=new Date().toISOString().slice(0,10);
  const regs=state.registers.filter(r=>r.classId===classId&&r.date>=from&&r.date<=to).sort((a,b)=>a.date.localeCompare(b.date));
  const s=stats(classId,learnerId,from,to),perf=averagePerformance(classId,learnerId,from,to),issue=learnerIssueSummary(classId,learnerId);
  const {jsPDF}=window.jspdf,p=new jsPDF({unit:"mm",format:"a4"});

  addPdfHeader(p,"Learner Support Report","Four-week attendance, punctuality and performance review");
  addPdfInfoPanel(p,[["Tutor",state.profile.name||"Not entered"],["College",state.profile.college||"Not entered"],["Generated",pdfGeneratedDate()],["Period",`${dateUK(from)} – ${dateUK(to)}`]],128,30,68);

  p.setFont("helvetica","bold");p.setFontSize(9);
  p.text(`Learner: ${l.name}`,14,38);p.text(`Class: ${c.name}`,14,46);p.text(`Course: ${c.course||"Not entered"}`,14,54);
  p.setFillColor(239,244,250);p.roundedRect(14,66,182,23,3,3,"F");
  p.setFontSize(11);p.text(`Attendance: ${s.pct===null?"—":s.pct+"%"}`,20,78);p.text(`Lateness: L×${s.lateCount}`,80,78);p.text(`Performance: ${perf}`,135,78);

  let y=101;
  p.setFontSize(11);p.text("Summary",14,y);y+=7;
  p.setFont("helvetica","normal");p.setFontSize(9);
  const summary=p.splitTextToSize(issue?.description||`${l.name} has no current attendance or performance concerns in the last 4 weeks.`,182);
  p.text(summary,14,y);y+=summary.length*5+10;

  p.setFont("helvetica","bold");p.setFontSize(11);p.text("Complete register history",14,y);y+=7;
  const x=[14,32,88,111,132,158],width=[18,56,23,21,26,38];
  const tableHeader=()=>{
    p.setFillColor(49,92,155);p.rect(14,y,182,10,"F");p.setTextColor(255);p.setFont("helvetica","bold");p.setFontSize(7.5);
    ["Date","Subject","Attendance","Late","Performance","Tutor notes"].forEach((h,i)=>p.text(h,x[i]+2,y+6));
    p.setTextColor(32);y+=10;
  };
  tableHeader();

  regs.forEach((r,i)=>{
    const vals=[dateUK(r.date),r.subject,`${dayPercentage(r,learnerId)??"—"}${dayPercentage(r,learnerId)!==null?"%":""}`,`L×${dailyLateCount(r,learnerId)}`,r.attendance[learnerId]?.performance||"Not recorded",r.notes||"—"];
    const wrapped=vals.map((v,j)=>p.splitTextToSize(String(v),width[j]-4));
    const rowH=Math.max(9,Math.max(...wrapped.map(v=>v.length))*4+4);
    if(y+rowH>275){p.addPage();y=22;tableHeader();}
    p.setFillColor(i%2?248:242,i%2?249:245,i%2?251:248);p.rect(14,y,182,rowH,"F");
    p.setFont("helvetica","normal");p.setFontSize(7.2);wrapped.forEach((v,j)=>p.text(v,x[j]+2,y+5));y+=rowH;
  });
  if(!regs.length){p.setFont("helvetica","normal");p.setFontSize(9);p.text("No registers were recorded during this 4-week period.",14,y+6);y+=14;}

  if(y>238){p.addPage();y=24;}
  p.setFont("helvetica","bold");p.setFontSize(11);p.text("Suggested next actions",14,y);y+=8;
  p.setFont("helvetica","normal");p.setFontSize(9);
  [
    "Discuss the pattern with the learner and agree a clear improvement target.",
    smartActionForIssue(issue),
    "Review progress again after the next 4 weeks."
  ].forEach((a,i)=>{const lines=p.splitTextToSize(`${i+1}. ${a}`,178);p.text(lines,14,y);y+=lines.length*5+3;});

  addPdfFooters(p,true);
  p.save(`${l.name}-${from}-to-${to}-Learner-Support-Report.pdf`);
}

function documents(){
  app.innerHTML=`<section class="card hero"><span class="eyebrow">SAVED RECORDS</span><h2>Records</h2><p>Completed registers grouped by class and month.</p></section>
  <section class="card"><div class="grid">
    <label>Class<select id="docClass"><option value="">All classes</option>${state.classes.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("")}</select></label>
    <label>Month<input id="docMonth" type="month"></label>
    <label>Exact date<input id="docDate" type="date"></label>
  </div><div class="buttons"><button class="primary" id="applyDocFilters">Apply filters</button><button class="secondary" id="clearDocFilters">Clear filters</button></div></section>
  <section id="docList"></section>`;

  const draw=()=>{
    let regs=[...state.registers].sort((a,b)=>b.date.localeCompare(a.date));
    if(docClass.value)regs=regs.filter(r=>r.classId===docClass.value);
    if(docMonth.value)regs=regs.filter(r=>r.date.startsWith(docMonth.value));
    if(docDate.value)regs=regs.filter(r=>r.date===docDate.value);

    const grouped={};
    regs.forEach(r=>{
      const month=r.date.slice(0,7);
      grouped[r.className] ||= {};
      grouped[r.className][month] ||= [];
      grouped[r.className][month].push(r);
    });

    docList.innerHTML=Object.keys(grouped).length?Object.entries(grouped).map(([className,months])=>`
      <section class="card"><h3>📁 ${esc(className)}</h3>
        ${Object.entries(months).map(([month,items])=>`<details open><summary><b>${new Date(month+"-01T12:00:00").toLocaleDateString("en-GB",{month:"long",year:"numeric"})}</b></summary>
          ${items.map(r=>`<div class="row"><div><b>${dateUK(r.date)}</b><div class="small">${esc(r.subject)}</div></div><div class="buttons"><button class="secondary" data-edit-reg="${r.id}">Edit</button><button class="secondary" data-dl="${r.id}">Download PDF</button><button class="danger" data-del="${r.id}">Delete</button></div></div>`).join("")}
        </details>`).join("")}
      </section>`).join(""):'<section class="card"><div class="empty">No registers match these filters.</div></section>';

    docList.querySelectorAll("[data-edit-reg]").forEach(b=>b.onclick=()=>register(b.dataset.editReg));
    docList.querySelectorAll("[data-dl]").forEach(b=>b.onclick=()=>{const r=state.registers.find(x=>x.id===b.dataset.dl),c=state.classes.find(x=>x.id===r.classId);pdf(r,c)});
    docList.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{if(confirm("Delete this register?")){state.registers=state.registers.filter(x=>x.id!==b.dataset.del);save();draw()}});
  };

  draw();
  applyDocFilters.onclick=draw;
  clearDocFilters.onclick=()=>{docClass.value="";docMonth.value="";docDate.value="";draw()};
}

if("serviceWorker"in navigator)addEventListener("load",()=>navigator.serviceWorker.register("service-worker.js"));render();
